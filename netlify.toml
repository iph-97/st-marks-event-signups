[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Scheduled function - runs daily at 9 AM UTC (4 AM EST / 5 AM EDT)
[functions."send-reminders"]
  schedule = "@daily"  # Cron: minute hour day month weekday